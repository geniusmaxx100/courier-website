<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Express Courier</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #0a3d62;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .hero {
      padding: 50px 15px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
    }

    input {
      padding: 12px;
      width: 90%;
      max-width: 300px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      width: 95%;
      max-width: 320px;
      margin-top: 10px;
      background: #e67e22;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      background: white;
      display: inline-block;
      padding: 15px;
      border-radius: 8px;
      color: black;
      width: 90%;
      max-width: 350px;
    }

    footer {
      margin-top: 50px;
      background: #0a3d62;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  🌍 Global Express Courier
</header>

<div class="hero">
  <h1>Track Your Shipment</h1>

  <input id="track" placeholder="Enter Tracking Number">
  <br>
  <button onclick="check()">Track</button>

  <div class="result" id="result"></div>
</div>

<footer>
  © 2026 Global Express Courier
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW0uYIwI_z2ihj2LtdmgXNV4B5dOf3TDk",
  authDomain: "globalcourier-3ba34.firebaseapp.com",
  projectId: "globalcourier-3ba34",
  appId: "1:827988291885:web:daa65d034e3773a57c63a4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.track = async function() {
  let num = document.getElementById("track").value;

  const ref = doc(db, "shipments", num);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    let data = snap.data();

    document.getElementById("result").innerHTML =
      "📦 " + data.status + "<br>📍 " + data.location;
  } else {
    document.getElementById("result").innerHTML =
      "❌ Not Found";
  }
};
</script>

</body>
</html>
