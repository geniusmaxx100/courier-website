<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Express Courier</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

/* NAVBAR */
nav {
  background: #0a3d62;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav h2 {
  margin: 0;
}

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
  font-size: 14px;
}

/* HERO */
.hero {
  background: linear-gradient(rgba(10,61,98,0.8), rgba(10,61,98,0.8)),
              url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
  background-size: cover;
  background-position: center;
  color: white;
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 32px;
}

.hero p {
  font-size: 16px;
}

/* TRACK BOX */
.track-box {
  background: white;
  margin: -40px auto 20px;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  text-align: center;
}

.track-box input {
  padding: 12px;
  width: 90%;
  margin-bottom: 10px;
}

.track-box button {
  padding: 12px;
  width: 95%;
  background: #e67e22;
  color: white;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  font-size: 14px;
}

/* FEATURES */
.features {
  padding: 30px 15px;
  text-align: center;
}

.feature {
  margin: 20px 0;
}

/* FOOTER */
footer {
  background: #0a3d62;
  color: white;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>🌍 Global Express</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Track</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Fast & Reliable Global Delivery</h1>
  <p>Track your shipment anywhere in the world</p>
</div>

<!-- TRACKING -->
<div class="track-box">
  <h3>Track Shipment</h3>
  <input id="track" placeholder="Enter Tracking Number">
  <button onclick="check()">Track</button>
  <div class="result" id="result"></div>
</div>

<!-- FEATURES -->
<div class="features">
  <div class="feature">🚚 Worldwide Delivery</div>
  <div class="feature">⚡ Fast Shipping</div>
  <div class="feature">🔒 Secure Handling</div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Global Express Courier
</footer>

<script>
function check() {
  let num = document.getElementById("track").value;
  let data = JSON.parse(localStorage.getItem("shipments")) || {};

  if (data[num]) {
    document.getElementById("result").innerHTML =
      "📦 " + data[num].status + "<br>" +
      "📍 " + data[num].location + "<br>" +
      "⏳ " + data[num].eta;
  } else {
    document.getElementById("result").innerHTML = "❌ Not Found";
  }
}
</script>

</body>
</html>
