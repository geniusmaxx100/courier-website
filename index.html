<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
 // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCz_XWEQ5kFL7zgvSAbQkMUsm_re4ATL1A",
  authDomain: "webdev-8e14f.firebaseapp.com",
  projectId: "webdev-8e14f",
  storageBucket: "webdev-8e14f.firebasestorage.app",
  messagingSenderId: "1090232821373",
  appId: "1:1090232821373:web:0ac793739c5e45990c7314",
  measurementId: "G-VYGTQ62TGQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.check = async function() {
  let num = document.getElementById("track").value;
  let docRef = doc(db, "shipments", num);
  let docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    let data = docSnap.data();
    document.getElementById("result").innerHTML =
      "📦 " + data.status + "<br>" +
      "📍 " + data.location + "<br>" +
      "⏳ " + data.eta;
  } else {
    document.getElementById("result").innerHTML = "❌ Not Found";
  }
};
</script>
