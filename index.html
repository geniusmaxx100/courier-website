<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Express Courier</title>

<style>
body { font-family: Arial; text-align: center; background:#f4f6f9; }
input, button { padding:12px; width:90%; max-width:300px; margin:5px; }
button { background:#e67e22; color:white; border:none; }
.result { margin-top:15px; }
</style>
</head>

<body>

<h2>🌍 Globalcourier</h2>
<h3>Track Shipment</h3>

<input id="track" placeholder="Enter Tracking Number">
<button onclick="check()">Track</button>

<div class="result" id="result"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW0uYIwI_z2ihj2LtdmgXNV4B5dOf3TDk",
  authDomain: "globalcourier-3ba34.firebaseapp.com",
  projectId: "globalcourier-3ba34",
  storageBucket: "globalcourier-3ba34.firebasestorage.app",
  messagingSenderId: "827988291885",
  appId: "1:827988291885:web:daa65d034e3773a57c63a4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.check = async function() {
  let num = document.getElementById("track").value;

  const ref = doc(db, "shipments", num);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    let data = snap.data();
    document.getElementById("result").innerHTML =
      "📦 Status: " + data.status + "<br>" +
      "📍 Location: " + data.location + "<br>" +
      "⏳ ETA: " + data.eta;
  } else {
    document.getElementById("result").innerHTML = "❌ Not Found";
  }
};
</script>

</body>
</html>
