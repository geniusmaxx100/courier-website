<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
</head>

<body>

<h2>📦 Admin panel</h2>

<input id="trackId" placeholder="Tracking Number"><br>
<input id="status" placeholder="Status"><br>
<input id="location" placeholder="Location"><br>

<select id="step">
<option value="0">Order Received</option>
<option value="1">In Transit</option>
<option value="2">Arrived at Hub</option>
<option value="3">Out for Delivery</option>
<option value="4">Delivered</option>
</select><br>

<button onclick="save()">Save Shipment</button>
<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW0uYIwI_z2ihj2LtdmgXNV4B5dOf3TDk",
  authDomain: "globalcourier-3ba34.firebaseapp.com",
  projectId: "globalcourier-3ba34",
  appId: "1:827988291885:web:daa65d034e3773a57c63a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 PROTECT PAGE
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// SAVE DATA
window.save = async function() {
  let id = document.getElementById("trackId").value;

  await setDoc(doc(db, "shipments", id), {
    status: document.getElementById("status").value,
    location: document.getElementById("location").value,
    step: parseInt(document.getElementById("step").value)
  });

  document.getElementById("msg").innerHTML = "✅ Saved to database!";
};
</script>

</body>
</html>
