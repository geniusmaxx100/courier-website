<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 12px;
  margin: 8px;
  width: 90%;
  max-width: 300px;
}
</style>
</head>

<body>

<h2>📦 Admin Dashboard</h2>

<input id="trackId" placeholder="Tracking Number"><br>
<input id="status" placeholder="Status (e.g. In Transit)"><br>
<input id="location" placeholder="Location"><br>

<button onclick="save()">Save Shipment</button>

<p id="msg"></p>

<script>
function save() {
  let id = document.getElementById("trackId").value;
  let status = document.getElementById("status").value;
  let location = document.getElementById("location").value;

  // Save to browser (temporary database)
  localStorage.setItem(id, JSON.stringify({ status, location }));

  document.getElementById("msg").innerHTML = "✅ Saved!";
}
</script>

</body>
</html>
