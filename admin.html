<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f6f9;
    }

    input {
      padding: 10px;
      width: 90%;
      max-width: 300px;
      margin: 5px;
    }

    button {
      padding: 10px;
      width: 95%;
      max-width: 320px;
      background: green;
      color: white;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Admin Panel</h2>

<input id="num" placeholder="Tracking Number"><br>
<input id="status" placeholder="Status (e.g. In Transit)"><br>
<input id="location" placeholder="Current Location"><br>
<input id="eta" placeholder="Estimated Delivery"><br>

<button onclick="save()">Save Shipment</button>
<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW0uYIwI_z2ihj2LtdmgXNV4B5dOf3TDk",
  authDomain: "globalcourier-3ba34.firebaseapp.com",
  projectId: "globalcourier-3ba34",
  appId: "1:827988291885:web:daa65d034e3773a57c63a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 PROTECT PAGE
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// SAVE DATA
window.save = async function() {
  let id = document.getElementById("trackId").value;

  await setDoc(doc(db, "shipments", id), {
    status: document.getElementById("status").value,
    location: document.getElementById("location").value,
    step: parseInt(document.getElementById("step").value)
  });

  document.getElementById("msg").innerHTML = "✅ Saved to database!";
  };
</script>

</body>
</html>
