<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
</head>

<body>

<h2>Admin Dashboard</h2>

<input id="id" placeholder="Tracking Number"><br>
<input id="status" placeholder="Status"><br>
<input id="location" placeholder="Location"><br>

<select id="step">
<option value="0">Order Received</option>
<option value="1">In Transit</option>
<option value="2">Arrived at Hub</option>
<option value="3">Out for Delivery</option>
<option value="4">Delivered</option>
</select><br>

<button onclick="save()">Save Shipment</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBW0uYIwI_z2ihj2LtdmgXNV4B5dOf3TDk",
  authDomain: "globalcourier-3ba34.firebaseapp.com",
  projectId: "globalcourier-3ba34",
  appId: "1:827988291885:web:daa65d034e3773a57c63a4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.save = async function() {
  let id = document.getElementById("id").value;

  await setDoc(doc(db, "shipments", id), {
    status: document.getElementById("status").value,
    location: document.getElementById("location").value,
    step: parseInt(document.getElementById("step").value)
    ship id: document.getElementById("shipid").value,
  });

  alert("Saved Successfully");
};
</script>

</body>
</html>
