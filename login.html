<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px #aaa;
      text-align: center;
    }
    input {
      padding: 10px;
      margin: 10px 0;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="login()">Login</button>
  <p id="msg" style="color:red;"></p>
</div>

<script>
function login() {
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  // Simple username & password
  if(username === "genius" && password === "2102") {
    window.location.href = "admin.html";
  } else {
    document.getElementById("msg").innerText = "❌ Invalid credentials!";
  }
}
</script>

</body>
</html>
